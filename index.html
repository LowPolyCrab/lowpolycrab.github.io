<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Programming Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          blackbg: '#0d0f14',     // softer than pure black
          greybg: '#161a22',      // main section background
          purpledark: '#1c212b',  // panels/cards
          lightgrey: '#d1d5db',   // main text (softer white)
          lavender: '#8b9cff'     // subtle accent (cool blue/purple)
        }
      }
    }
  }
</script></script>
</head>
<body class="bg-blackbg text-lightgrey font-sans">

  <!-- Header -->
  <header class="text-center py-12 bg-purpledark text-lightgrey border-b border-gray-800">
    <h1 class="text-4xl font-bold mb-2">Blake Smith – Game Programmer</h1>
    <p class="text-lg text-gray-400">Gameplay Systems • AI • Tools Development</p>
  </header>

  <!-- Reel Section -->
  <section class="reel flex justify-center py-12 bg-greybg">
    <div class="w-full max-w-4xl aspect-video rounded-lg overflow-hidden shadow-lg">
      <iframe 
        src="https://www.youtube.com/embed/rZ57Gf44UVg"
        title="Demo Reel"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        class="w-full h-full">
      </iframe>
    </div>
  </section>

  <!-- Projects Accordion -->
  <section id="projects" class="max-w-5xl mx-auto py-16 px-4 space-y-6">
    <!-- JS will inject project cards here -->
  </section>

  <!-- Footer -->
  <footer class="text-center py-8 bg-purpledark text-gray-500 border-t border-gray-800">
    © 2026 Blake Smith | Portfolio
  </footer>

  <!-- Project JS -->
  <script src="js/projects.js"></script>

</body>
</html>
